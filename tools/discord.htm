<HTML>
	<HEAD>
		<TITLE>Webhook</TITLE>
	</HEAD>
	<BODY>
		<TABLE style="border: 1px black;">
			<TR>
				<TD colspan="2"><H3 id="title">Envoi de message VIA Webhook</H3></TD>
			<TR>
			<TR>
				<TD>
					<SELECT id="target" size="5" style="width: 128px; height: 100%; border: none;">
						<OPTION>Main (No Thread)</OPTION>
						<OPTION>News</OPTION>
						<OPTION>Général</OPTION>
						<OPTION>Suggestions</OPTION>
						<OPTION>Up to 1 000 000</OPTION>
					</SELECT>
				</TD>
				<TD><TEXTAREA name="msg" id="msg" cols="80" rows="24"></TEXTAREA></TD>
			<TR>
			<TR>
				<TD colspan="2">
					<BUTTON style="width: 49.5%;" onclick="discordNewMessage();">Send</BUTTON>
					<BUTTON style="width: 49.5%;" onclick="discordUpdateMessage();">Update</BUTTON>
				</TD>
			</TR>
		</TABLE>
		<BUTTON onclick="discordNewWebhook();">New Webhook</BUTTON>
	</BODY>
</HTML>

<SCRIPT>
	function discordNewMessage() {
		var webhook = "https://discord.com/api/webhooks/941371998758653962/VdnAtfSJo8zkdt7916xS50mgt1oqr_gP0mcxAT0_iXPp7mlxO4mLzZl-0TSIDuwh5B9S";
		var thread = "";
		var isNews = false;
	
		var message = "\n" + document.getElementById('msg').value;
		
		switch(document.getElementById('target').value)
		{
			case "News": 
				thread += "?thread_id=941376519148802129"; 
				isNews = true;
				break;
			case "Général": thread += "?thread_id=941021362120704030"; break;
			case "Suggestions": thread += "?thread_id=941022097822597212"; break;
			case "Up to 1 000 000": thread += "?thread_id=941021656015589437"; break;
		}
		
        var xhr = new XMLHttpRequest();
        xhr.open("POST", webhook + thread, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.send(JSON.stringify({
            'content': message,
            'username':'La PouTeam',
        }));
		
		if (isNews) {
			discordUpdateMessage();
		}
    }
