<!DOCTYPE HTML>
<HTML>
    <HEAD>
        <META charset="UTF-8">
        <LINK rel="stylesheet" href="css/embeds.css">
        <LINK rel="stylesheet" href="css/blog.css">
        <LINK rel="stylesheet" href="css/mobile.css">

        <LINK rel="preconnect" href="https://fonts.googleapis.com">
        <LINK rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <LINK href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500&display=swap" rel="stylesheet">

        <SCRIPT src="js/gotoPage.js"></SCRIPT>
        <SCRIPT src="js/labels.js"></SCRIPT>
    </HEAD>
    <BODY>
        <H1 id="title" label-index="blog.title">The Blog</H1>
        <DIV id="blogList"></DIV>

        <SCRIPT>
            var BLOG_MANIFEST_PATH = "pages/posts/posts.json";

            function decodePostTitle(fileName) {
                var stem = fileName.replace(/\.html$/i, "");
                try {
                    return decodeURIComponent(stem.replace(/\+/g, "%20"));
                } catch (error) {
                    return stem;
                }
            }

            function openPost(path) {
                var relativePath = path.replace(/^pages\//, "").replace(/\.html$/i, "");
                if (typeof openContent === "function") {
                    openContent(relativePath);
                    return;
                }

                window.location.href = "/" + path;
            }

            function getPostPath(post) {
                if (post && typeof post.path === "string" && post.path.length > 0) {
                    return post.path;
                }

                if (post && typeof post.name === "string" && post.name.length > 0) {
                    return "pages/posts/" + post.name;
                }

                return "";
            }

            function getPostName(post) {
                if (post && typeof post.name === "string" && post.name.length > 0) {
                    return post.name;
                }

                var postPath = getPostPath(post);
                return postPath.split("/").pop() || "";
            }

            function getPostTitle(post) {
                if (post && typeof post.title === "string" && post.title.length > 0) {
                    return post.title;
                }

                return decodePostTitle(getPostName(post));
            }

            function getPostDescription(post) {
                if (post && typeof post.description === "string") {
                    return post.description;
                }

                return "";
            }

            function parsePostDateMs(post) {
                if (!post || !post.createdAt) {
                    return 0;
                }

                var parsed = Date.parse(post.createdAt);
                return Number.isFinite(parsed) ? parsed : 0;
            }

            function renderEmpty(message, translationKey) {
                var container = document.getElementById("blogList");
                var i18nKey = translationKey || "blog.empty";
                container.innerHTML = "<DIV><DIV><H2 label-index=\"" + i18nKey + "\">" + message + "</H2></DIV></DIV>";

                if (typeof applyTranslations === "function") {
                    applyTranslations(container);
                }
            }

            function renderPosts(posts, listingView) {
                var container = document.getElementById("blogList");
                var html = [];

                if (!posts.length) {
                    renderEmpty("Nothing has been posted yet.", "blog.empty");
                    return;
                }

                if (listingView) {
                    html.push("<DIV>");
                    posts.forEach(function (post) {
                        var postPath = getPostPath(post);
                        var encodedListPath = encodeURIComponent(postPath);
                        html.push("<DIV class=\"left button\" onclick=\"openPost(decodeURIComponent('" + encodedListPath + "'));\">" + getPostTitle(post) + "</DIV>");
                    });
                    html.push("</DIV>");
                } else {
                    html.push("<DIV class=\"blogBody\">");
                    posts.slice(0, 9).forEach(function (post) {
                        var postPath = getPostPath(post);
                        var encodedCardPath = encodeURIComponent(postPath);
                        html.push("<DIV class=\"card\" onclick=\"openPost(decodeURIComponent('" + encodedCardPath + "'));\">");
                        html.push("<DIV><H2>" + getPostTitle(post) + "</H2></DIV>");
                        html.push("<DIV>" + getPostDescription(post) + "</DIV>");
                        html.push("<DIV></DIV>");
                        html.push("</DIV>");
                    });
                    html.push("</DIV>");

                    if (posts.length > 9) {
                        html.push("<DIV class=\"button\" onclick=\"window.location.search='?listing=1';\" label-index=\"blog.listAll\">List all posts</DIV>");
                    }
                }

                container.innerHTML = html.join("");

                if (typeof applyTranslations === "function") {
                    applyTranslations(container);
                }
            }

            async function loadPosts() {
                var listingView = window.location.search.indexOf("listing=1") !== -1;

                try {
                    var response = await fetch(BLOG_MANIFEST_PATH, { cache: "no-cache" });

                    if (!response.ok) {
                        throw new Error("Blog manifest request failed with status " + response.status);
                    }

                    var manifest = await response.json();
                    if (!manifest || !Array.isArray(manifest.posts)) {
                        throw new Error("Unexpected manifest format. Expected { posts: [] }.");
                    }

                    var posts = manifest.posts
                        .filter(function (post) {
                            return /\.html$/i.test(getPostPath(post));
                        })
                        .sort(function (a, b) {
                            var dateDelta = parsePostDateMs(b) - parsePostDateMs(a);
                            if (dateDelta !== 0) {
                                return dateDelta;
                            }

                            return getPostName(b).localeCompare(getPostName(a));
                        });

                    renderPosts(posts, listingView);
                } catch (error) {
                    console.error(error);
                    renderEmpty(
                        typeof t === "function" ? t("blog.loadError", "Could not load posts right now.") : "Could not load posts right now.",
                        "blog.loadError"
                    );
                }
            }

            if (typeof initI18n === "function") {
                initI18n().then(function () {
                    loadPosts();
                });
            } else {
                loadPosts();
            }
        </SCRIPT>
    </BODY>
</HTML>
